mode: Mainline

branches:
  master:
    regex: master
    tag: ''
    increment: Patch

commit-message-incrementing: Enabled

major-version-bump-message: '^(feat|feature)(\(#\d+\))?!:|BREAKING CHANGE'
minor-version-bump-message: '^(feat|feature)(\(#\d+\))?:'
patch-version-bump-message: '^fix(\(#\d+\))?:'
